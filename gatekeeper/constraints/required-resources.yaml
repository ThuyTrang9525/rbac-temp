apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sContainerLimits
metadata:
  name: container-required-resources
spec:
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
    namespaces:
      - demo
      - payments
  parameters:
    # Bắt buộc tất cả các container bên trong Pod phải khai báo cấu hình limits
    required_limits:
      - cpu
      - memory